<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown 渲染測試</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
</head>
<body class="bg-gray-50 p-8">
  <div class="max-w-4xl mx-auto">
    <h1 class="text-2xl font-bold mb-6">Markdown 渲染測試</h1>
    
    <div class="bg-white rounded-lg shadow-lg p-6">
      <h2 class="text-lg font-semibold mb-4">AI 回覆預覽</h2>
      <div id="chatHistory" class="space-y-3">
        <!-- 測試訊息將顯示在這裡 -->
      </div>
    </div>
    
    <div class="mt-6 bg-white rounded-lg shadow-lg p-6">
      <h2 class="text-lg font-semibold mb-4">測試 Markdown 內容</h2>
      <button id="testBtn" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700">
        顯示測試訊息
      </button>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    document.getElementById('testBtn').addEventListener('click', () => {
      const testMarkdown = `很好！讓我為您解釋一下這段程式碼的評分：

## 📊 總分：80 分

### ✅ 優點

1. **邏輯正確**：程式能夠正確計算 1 到 n 的總和
2. **程式碼簡潔**：使用了 Python 的 \`sum()\` 和 \`range()\` 函數，非常精簡
3. **易於理解**：變數命名清楚（\`n\`, \`total\`）

### 🔍 各項評分說明

| 項目 | 得分 | 說明 |
|------|------|------|
| 時間複雜度 | 8/10 | 使用 sum() 函數，時間複雜度為 O(n)，算是不錯 |
| 空間複雜度 | 9/10 | 僅使用常數空間，非常優秀 |
| 可讀性 | 7/10 | 程式碼清晰，但缺少註解 |
| 穩定性 | 10/10 | 沒有明顯的錯誤風險 |

### 💡 改進建議

以下是一些可以讓程式碼更好的建議：

1. **添加註解**：
   \`\`\`python
   # 讀取使用者輸入
   n = int(input())
   # 計算 1 到 n 的總和
   total = sum(range(1, n + 1))
   print(total)
   \`\`\`

2. **使用數學公式**：可以使用高斯公式 \`n * (n + 1) // 2\` 提升效率
   - 時間複雜度可以從 O(n) 降到 O(1)

3. **錯誤處理**：考慮輸入不合法的情況

### 🤔 後續問題

Q1: 你知道為什麼使用數學公式 \`n * (n + 1) // 2\` 會比 \`sum(range(1, n+1))\` 更快嗎？

Q2: 如果 n 是負數或 0，程式會發生什麼？需要額外處理嗎？

Q3: 你能試試看用 **for 迴圈** 來實作相同的功能嗎？

Q4: 除了總和，你能計算 1 到 n 的**平均值**嗎？

繼續加油！💪 有任何問題都可以隨時問我喔～`;

      addChatMessage(testMarkdown, false);
    });
  </script>
</body>
</html>
